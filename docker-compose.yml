# Zeo++ API Docker Compose Configuration
# Updated: 2025-12-31
# 
# 使用方法 (Usage):
#   1. 复制 .env.example 为 .env: cp .env.example .env
#   2. 根据需要修改 .env 中的配置
#   3. 启动服务: docker-compose up -d
#
# 所有配置项都可以通过 .env 文件修改，无需编辑此文件

services:
  zeopp-api:
    container_name: ${CONTAINER_NAME:-zeopp-api}
    build:
      context: .
      dockerfile: Dockerfile
    image: zeopp-api:${IMAGE_TAG:-0.3.1}
    ports:
      - "${HOST_PORT:-9876}:8000"
    environment:
      - ZEO_EXEC_PATH=${ZEO_EXEC_PATH:-/usr/local/bin/network}
      - ENABLE_CACHE=${ENABLE_CACHE:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      # Performance settings
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
      - MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS:-4}
    volumes:
      - zeopp-workspace:/app/workspace
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      # 注意：OMS 等长时间计算任务可能导致服务响应变慢
      # 增加 timeout 和 retries 以避免误判为 unhealthy
      test: ["CMD", "curl", "-f", "--max-time", "30", "http://localhost:8000/health"]
      interval: ${HEALTHCHECK_INTERVAL:-60}s
      timeout: ${HEALTHCHECK_TIMEOUT:-30}s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2}'
          memory: ${MEMORY_LIMIT:-2G}
        reservations:
          cpus: '${CPU_RESERVATION:-0.5}'
          memory: ${MEMORY_RESERVATION:-512M}
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

volumes:
  zeopp-workspace:
    driver: local
